networks:
  sandboxed-net:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
  sandboxed_data:

services:
  sandboxed:
    image: ghcr.io/th0rgal/sandboxed.sh:latest
    container_name: sandboxed
    privileged: true
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - LISTEN_ADDR=0.0.0.0:3000
      - SANDBOXED_USERS=admin:${RELAY_JWT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxed_data:/data
    networks:
      - sandboxed-net

  phantom-relay:
    build: ./phantom-relay
    container_name: phantom-relay
    environment:
      - SANDBOXED_URL=http://sandboxed:3000
      - SANDBOXED_JWT=${RELAY_JWT}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    depends_on:
      - sandboxed
    networks:
      - sandboxed-net
    restart: unless-stopped

  evolution-worker:
    build: ./evolution-worker
    container_name: evolution-worker
    environment:
      - SANDBOXED_URL=http://sandboxed:3000
      - SANDBOXED_JWT=${RELAY_JWT}
      - LIBRARY_REPO_URL=${LIBRARY_REPO_URL}
      - EVOLUTION_USE_LLM_JUDGES=${EVOLUTION_USE_LLM_JUDGES}
    depends_on:
      - sandboxed
    networks:
      - sandboxed-net
    restart: unless-stopped

  memory-mcp:
    build: ./memory-mcp
    container_name: memory-mcp
    environment:
      - MEMORY_MCP_HTTP_PORT=3333
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "3333:3333"
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - sandboxed-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sandboxed-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sandboxed-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: sandboxed-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sandboxed-net
    restart: unless-stopped