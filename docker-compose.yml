networks:
  sandboxed-net:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
  sandboxed_data:

services:
  sandboxed:
    build: ./sandboxed.sh
    container_name: sandboxed
    privileged: true
    cgroup: host
    ports:
      - "3333:80"
    environment:
      - DEV_MODE=false
      - DASHBOARD_PASSWORD=${SANDBOXED_DASHBOARD_PASSWORD}
      - JWT_SECRET=${SANDBOXED_JWT_SECRET}
      - JWT_TTL_DAYS=30
      - LIBRARY_REMOTE=${LIBRARY_REPO_URL}
    volumes:
      - sandboxed_data:/root/.sandboxed-sh
    networks:
      - sandboxed-net
    restart: unless-stopped

  phantom-relay:
    build: ./phantom-relay
    container_name: phantom-relay
    environment:
      - SANDBOXED_URL=http://sandboxed
      - SANDBOXED_JWT=${SANDBOXED_JWT}
      - SANDBOXED_BACKEND=opencode
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    depends_on:
      - sandboxed
    networks:
      - sandboxed-net
    restart: unless-stopped

  evolution-worker:
    build: ./evolution-worker
    container_name: evolution-worker
    environment:
      - SANDBOXED_URL=http://sandboxed
      - SANDBOXED_JWT=${SANDBOXED_JWT}
      - LIBRARY_REPO_URL=${LIBRARY_REPO_URL}
      - EVOLUTION_USE_LLM_JUDGES=${EVOLUTION_USE_LLM_JUDGES}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - sandboxed
    networks:
      - sandboxed-net
    restart: unless-stopped

  memory-mcp:
    build: ./memory-mcp
    container_name: memory-mcp
    environment:
      - MEMORY_MCP_HTTP_PORT=3333
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "3334:3333"
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - sandboxed-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sandboxed-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sandboxed-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: sandboxed-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sandboxed-net
    restart: unless-stopped
